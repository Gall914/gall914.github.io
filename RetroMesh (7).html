<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050805">
<title>RetroMesh</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');
:root{
  --bg:#050805;--s1:#0b100b;--s2:#0e160e;--bdr:#183018;
  --g0:#33ff00;--g1:#1fcc00;--g2:#0d6600;--g3:#063300;--g4:#031a00;
  --red:#ff4040;--amb:#ffb300;--txt:#c8e8c8;--dim:#3d5c3d;
  --scan:rgba(51,255,0,.016);
  --top:env(safe-area-inset-top,0px);--bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{position:fixed;inset:0;display:flex;flex-direction:column;font-family:'Share Tech Mono',monospace;color:var(--txt);-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px)}
#shell{display:flex;flex-direction:column;height:100%;width:100%;max-width:480px;margin:0 auto;border-left:1px solid var(--bdr);border-right:1px solid var(--bdr);position:relative;z-index:1;overflow:hidden}
#topbar{flex-shrink:0;background:var(--s1);border-bottom:2px solid var(--g2);padding-top:var(--top);height:calc(var(--top) + 54px);display:flex;align-items:center;padding-left:16px;padding-right:16px;justify-content:space-between;box-shadow:0 0 30px rgba(51,255,0,.1)}
.logo{font-family:'VT323',monospace;font-size:28px;letter-spacing:5px;color:var(--g0);text-shadow:0 0 16px var(--g0),0 0 40px rgba(51,255,0,.25)}
.status{display:flex;align-items:center;gap:8px}
#dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:all .5s}
#dot.on{background:var(--g0);box-shadow:0 0 8px var(--g0);animation:pulse 3s infinite}
#dot.off{background:var(--red);box-shadow:0 0 8px var(--red)}
#dot.wait{background:var(--amb);box-shadow:0 0 8px var(--amb);animation:pulse 1s infinite}
#clabel{font-size:10px;color:var(--dim);letter-spacing:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
#screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;display:none;flex-direction:column;background:var(--bg)}
.screen.active{display:flex}
#s-login{justify-content:center;align-items:center;padding:20px}
.card{width:100%;max-width:360px;border:1px solid var(--g2);background:var(--s1);overflow:hidden;box-shadow:0 0 40px rgba(51,255,0,.07)}
.card-head{background:var(--g0);color:var(--bg);font-family:'VT323',monospace;font-size:21px;letter-spacing:3px;padding:11px 16px}
.card-body{padding:20px;display:flex;flex-direction:column;gap:13px}
.tabs{display:flex;border:1px solid var(--g3)}
.tab{flex:1;padding:10px;font-family:'VT323',monospace;font-size:18px;letter-spacing:2px;text-align:center;cursor:pointer;color:var(--dim);background:transparent;border:none;transition:all .15s}
.tab.act{background:var(--g3);color:var(--g0)}
.flabel{font-size:10px;color:var(--g1);letter-spacing:2px;margin-bottom:5px;display:block}
.flabel::before{content:'// ';color:var(--g3)}
input[type=text],input[type=password],input[type=email]{width:100%;background:var(--bg);border:1px solid var(--g3);border-bottom-color:var(--g2);color:var(--g0);font-family:'Share Tech Mono',monospace;font-size:15px;padding:12px 13px;outline:none;caret-color:var(--g0);-webkit-appearance:none;appearance:none;border-radius:0;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:var(--g1);box-shadow:0 0 14px rgba(51,255,0,.1)}
input::placeholder{color:var(--dim)}
.errtxt{font-size:11px;color:var(--red);min-height:16px;text-align:center;letter-spacing:.5px;line-height:1.5}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;background:transparent;border:1px solid var(--g1);color:var(--g0);font-family:'VT323',monospace;font-size:20px;letter-spacing:2px;padding:14px;cursor:pointer;width:100%;min-height:52px;transition:background .15s;-webkit-appearance:none;user-select:none}
.btn:active{background:rgba(51,255,0,.12)}
.btn.red{border-color:var(--red);color:var(--red)}
.btn.red:active{background:rgba(255,64,64,.1)}
.hint{font-size:10px;color:var(--dim);text-align:center;line-height:1.8}
.spin{width:18px;height:18px;border:2px solid var(--g3);border-top-color:var(--g0);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.shead{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--bdr);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;min-height:56px}
.stitle{font-family:'VT323',monospace;font-size:26px;color:var(--g0);letter-spacing:3px;text-shadow:0 0 10px rgba(51,255,0,.3)}
.chats-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:relative}
.chats-body::-webkit-scrollbar{display:none}
#empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px;color:var(--dim);text-align:center;pointer-events:none}
#empty-state.hidden{display:none}
.eico{font-family:'VT323',monospace;font-size:80px;color:var(--g3);line-height:1}
.etxt{font-size:12px;letter-spacing:2px;line-height:2.2}
.chatrow{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bdr);cursor:pointer;gap:13px;min-height:70px;transition:background .1s}
.chatrow:active{background:rgba(51,255,0,.05)}
.av{width:44px;height:44px;flex-shrink:0;border:1px solid var(--g2);background:var(--g4);display:flex;align-items:center;justify-content:center;font-family:'VT323',monospace;font-size:22px;color:var(--g0)}
.cinfo{flex:1;min-width:0}
.cname{font-size:14px;color:var(--txt);letter-spacing:1px}
.cprev{font-size:11px;color:var(--dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{background:var(--g0);color:var(--bg);font-size:11px;font-weight:bold;min-width:22px;height:22px;border-radius:2px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0}
#fab{position:absolute;bottom:calc(16px + var(--bot));left:16px;width:56px;height:56px;background:var(--g0);border:none;color:var(--bg);font-size:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:2px;box-shadow:0 4px 20px rgba(51,255,0,.4);font-family:'VT323',monospace;transition:transform .15s;z-index:10}
#fab:active{transform:scale(.91)}
#bnav{flex-shrink:0;background:var(--s1);border-top:1px solid var(--bdr);padding-bottom:var(--bot);display:none}
.navrow{display:flex}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 8px;min-height:56px;cursor:pointer;border:none;background:transparent;color:var(--dim);font-size:10px;letter-spacing:1.5px;font-family:'Share Tech Mono',monospace}
.nico{font-size:24px;line-height:1;transition:color .2s,text-shadow .2s}
.ntab.act,.ntab.act .nico{color:var(--g0)}
.ntab.act .nico{text-shadow:0 0 10px var(--g0)}
.ntab:active{background:rgba(51,255,0,.06)}
#chat-hdr{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:10px 14px;gap:12px;min-height:60px}
.backbtn{width:40px;height:40px;flex-shrink:0;border:1px solid var(--g3);background:transparent;color:var(--g1);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.backbtn:active{background:rgba(51,255,0,.1)}
.chat-av{width:38px;height:38px;flex-shrink:0;border:1px solid var(--g2);background:var(--g4);display:flex;align-items:center;justify-content:center;font-family:'VT323',monospace;font-size:18px;color:var(--g0)}
.chat-nfo{flex:1;min-width:0}
.chat-pname{font-family:'VT323',monospace;font-size:20px;color:var(--g0);letter-spacing:2px;text-shadow:0 0 8px rgba(51,255,0,.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-psub{font-size:10px;color:var(--dim);letter-spacing:1px}
#msglist{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--g3) transparent}
#msglist::-webkit-scrollbar{width:3px}
#msglist::-webkit-scrollbar-thumb{background:var(--g3)}
.mg{display:flex;flex-direction:column;max-width:82%;gap:2px;animation:pop .18s cubic-bezier(.34,1.56,.64,1)}
.mg.me{align-self:flex-end;align-items:flex-end}
.mg.them{align-self:flex-start;align-items:flex-start}
@keyframes pop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.bub{padding:8px 12px;font-size:14px;line-height:1.5;word-break:break-word}
.me .bub{background:var(--g3);border:1px solid var(--g2);color:var(--g0);border-radius:12px 2px 12px 12px}
.them .bub{background:var(--s2);border:1px solid var(--bdr);color:var(--txt);border-radius:2px 12px 12px 12px}
.mmeta{font-size:10px;color:var(--dim);padding:0 3px}
#ibar{flex-shrink:0;border-top:1px solid var(--bdr);background:var(--s1);padding:10px 12px calc(10px + var(--bot));display:flex;align-items:center;gap:8px}
#msginput{flex:1;height:46px;background:var(--bg);border:1px solid var(--g3);border-bottom-color:var(--g2);color:var(--g0);font-family:'Share Tech Mono',monospace;font-size:15px;padding:10px 12px;outline:none;caret-color:var(--g0);-webkit-appearance:none;appearance:none;border-radius:0;transition:border-color .2s}
#msginput:focus{border-color:var(--g1);box-shadow:0 0 12px rgba(51,255,0,.1)}
#msginput::placeholder{color:var(--dim)}
#sendbtn{width:46px;height:46px;flex-shrink:0;background:var(--g0);border:none;color:var(--bg);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'VT323',monospace;transition:opacity .15s,transform .1s}
#sendbtn:active{opacity:.75;transform:scale(.93)}
#s-profile{overflow-y:auto}
.prof-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.prof-hero{display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 20px;border:1px solid var(--bdr);background:var(--s1)}
.bigav{width:76px;height:76px;border:2px solid var(--g1);background:var(--g4);display:flex;align-items:center;justify-content:center;font-family:'VT323',monospace;font-size:40px;color:var(--g0);box-shadow:0 0 24px rgba(51,255,0,.1)}
.pname-big{font-family:'VT323',monospace;font-size:28px;color:var(--g0);letter-spacing:3px;text-shadow:0 0 10px rgba(51,255,0,.3)}
.psub{font-size:10px;color:var(--dim);letter-spacing:2px}
.irow{display:flex;align-items:center;border:1px solid var(--bdr);background:var(--s1);padding:13px 16px;gap:10px}
.ikey{font-size:10px;color:var(--dim);letter-spacing:2px;width:70px;flex-shrink:0}
.ival{font-size:12px;color:var(--g1);flex:1;word-break:break-all}
.cpybtn{font-size:15px;color:var(--dim);background:transparent;border:none;cursor:pointer;padding:6px 10px;transition:color .15s}
.cpybtn:active{color:var(--g0)}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:none;align-items:flex-end}
#modal.open{display:flex}
.msheet{width:100%;max-width:480px;margin:0 auto;background:var(--s1);border-top:2px solid var(--g1);padding:20px 20px calc(20px + var(--bot));display:flex;flex-direction:column;gap:14px;box-shadow:0 -10px 40px rgba(51,255,0,.1);transform:translateY(100%);transition:transform .3s cubic-bezier(0.32,.72,0,1)}
#modal.open .msheet{transform:translateY(0)}
.mtitle{font-family:'VT323',monospace;font-size:22px;color:var(--g0);letter-spacing:3px}
.mrow{display:flex;gap:10px}
#mstatus{font-size:12px;min-height:20px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.5px}
#mstatus.ok{color:var(--g0)}
#mstatus.err{color:var(--red)}
#mstatus.searching{color:var(--amb)}
#toast{position:fixed;bottom:calc(72px + var(--bot));left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--g2);color:var(--g0);font-size:12px;letter-spacing:1.5px;padding:10px 20px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:9000;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.6)}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="shell">
  <div id="topbar">
    <div class="logo">◈ RETROMESH</div>
    <div class="status"><div id="dot"></div><span id="clabel">…</span></div>
  </div>
  <div id="screens">

    <!-- LOGIN -->
    <div id="s-login" class="screen active">
      <div class="card">
        <div class="card-head">▶ RETROMESH</div>
        <div class="card-body">
          <div class="tabs">
            <button class="tab act" id="tab-login" onclick="switchTab('login')">ВХОД</button>
            <button class="tab" id="tab-reg" onclick="switchTab('reg')">РЕГИСТРАЦИЯ</button>
          </div>
          <div id="form-login">
            <div style="margin-bottom:12px">
              <label class="flabel">E-MAIL</label>
              <input type="email" id="l-email" placeholder="user@mail.com" autocomplete="email" autocapitalize="none">
            </div>
            <div>
              <label class="flabel">ПАРОЛЬ</label>
              <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
            </div>
          </div>
          <div id="form-reg" style="display:none">
            <div style="margin-bottom:12px">
              <label class="flabel">НИК (только a-z, 0-9, _)</label>
              <input type="text" id="r-name" placeholder="ivan_petrov" maxlength="24" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
            </div>
            <div style="margin-bottom:12px">
              <label class="flabel">E-MAIL</label>
              <input type="email" id="r-email" placeholder="user@mail.com" autocomplete="email" autocapitalize="none">
            </div>
            <div>
              <label class="flabel">ПАРОЛЬ (мин. 6 символов)</label>
              <input type="password" id="r-pass" placeholder="••••••••" autocomplete="new-password">
            </div>
          </div>
          <div class="errtxt" id="lerr"></div>
          <button class="btn" id="lbtn">
            <span id="lbtn-txt">[ ВОЙТИ ]</span>
            <div class="spin" id="lspin" style="display:none"></div>
          </button>
          <div class="hint" id="lhint">Нет аккаунта? Перейди на вкладку РЕГИСТРАЦИЯ</div>
        </div>
      </div>
    </div>

    <!-- CHATS -->
    <div id="s-chats" class="screen">
      <div class="shead"><div class="stitle">ЧАТЫ</div></div>
      <div class="chats-body">
        <div id="chat-list"></div>
        <div id="empty-state">
          <div class="eico">◈</div>
          <div class="etxt">ПОКА НЕТ<br>АКТИВНЫХ ЧАТОВ<br><span style="font-size:10px;color:var(--dim)">нажми + чтобы начать</span></div>
        </div>
      </div>
      <button id="fab">＋</button>
    </div>

    <!-- CHAT VIEW -->
    <div id="s-chat" class="screen">
      <div id="chat-hdr">
        <button class="backbtn" id="backbtn">◀</button>
        <div class="chat-av" id="chat-av">?</div>
        <div class="chat-nfo">
          <div class="chat-pname" id="chat-pname">—</div>
          <div class="chat-psub">RETROMESH · REALTIME</div>
        </div>
      </div>
      <div id="msglist"></div>
      <div id="ibar">
        <input type="text" id="msginput" placeholder="Сообщение..." autocomplete="off" spellcheck="false">
        <button id="sendbtn">▶</button>
      </div>
    </div>

    <!-- PROFILE -->
    <div id="s-profile" class="screen">
      <div class="shead"><div class="stitle">ПРОФИЛЬ</div></div>
      <div class="prof-body">
        <div class="prof-hero">
          <div class="bigav" id="pav">?</div>
          <div class="pname-big" id="pname">—</div>
          <div class="psub">RETROMESH NETWORK</div>
        </div>
        <div class="irow"><div class="ikey">НИК</div><div class="ival" id="p-nick">—</div><button class="cpybtn" id="cpybtn">⧉</button></div>
        <div class="irow"><div class="ikey">EMAIL</div><div class="ival" id="p-email">—</div></div>
        <button class="btn red" id="logoutbtn" style="margin-top:8px">[ ВЫЙТИ ИЗ АККАУНТА ]</button>
      </div>
    </div>

  </div>
  <nav id="bnav">
    <div class="navrow">
      <button class="ntab act" data-s="chats"><span class="nico">◫</span><span>ЧАТЫ</span></button>
      <button class="ntab" data-s="profile"><span class="nico">◉</span><span>ПРОФИЛЬ</span></button>
    </div>
  </nav>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="msheet">
    <div class="mtitle">＋ НОВЫЙ ЧАТ</div>
    <div>
      <label class="flabel">НИК СОБЕСЕДНИКА</label>
      <input type="text" id="peer-inp" placeholder="username" maxlength="24"
        autocomplete="off" spellcheck="false" autocapitalize="none" autocorrect="off">
    </div>
    <div id="mstatus"></div>
    <div class="mrow">
      <button class="btn" id="modal-ok" style="flex:1">[ НАЙТИ И ОТКРЫТЬ ]</button>
      <button class="btn" id="modal-cancel" style="flex:0.4;border-color:var(--bdr);color:var(--dim)">[ ✕ ]</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBsi-K-yqcLw231KfqFqMd3XxrJrxztFbM",
  authDomain: "retromeshchat.firebaseapp.com",
  databaseURL: "https://retromeshchat-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "retromeshchat",
  storageBucket: "retromeshchat.firebasestorage.app",
  messagingSenderId: "239709570570",
  appId: "1:239709570570:web:c22ce12fbf1737379fc1f3"
});

const auth = firebase.auth();
const db   = firebase.database();

let ME_UID='', ME_NICK='', CUR_PEER='', CUR_CH='';
let contacts=[], msgCache={}, listeners={}, unread={};

const $=id=>document.getElementById(id);
const ini=s=>(s||'?')[0].toUpperCase();
const chid=(a,b)=>[a,b].sort().join('__');
const fmt=ts=>{const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function toast(msg,dur=2800){const e=$('toast');e.textContent=msg;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),dur)}
function setConn(st){const d=$('dot'),l=$('clabel');if(st==='on'){d.className='on';l.textContent='ONLINE';l.style.color='var(--g1)'}else if(st==='off'){d.className='off';l.textContent='OFFLINE';l.style.color='var(--red)'}else{d.className='wait';l.textContent='SYNC…';l.style.color='var(--amb)'}}
function setLerr(m){$('lerr').textContent=m}
function setBtnLoad(on){$('lbtn-txt').style.display=on?'none':'';$('lspin').style.display=on?'block':'none';$('lbtn').disabled=on}

let curScr='login';
function goTo(scr){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('s-'+scr).classList.add('active');curScr=scr;
  document.querySelectorAll('.ntab').forEach(t=>t.classList.toggle('act',t.dataset.s===scr));
  $('bnav').style.display=(scr==='login'||scr==='chat')?'none':'block';
}
document.querySelectorAll('.ntab').forEach(t=>t.onclick=()=>goTo(t.dataset.s));

let curTab='login';
function switchTab(tab){
  curTab=tab;
  $('form-login').style.display=tab==='login'?'':'none';
  $('form-reg').style.display=tab==='reg'?'':'none';
  $('tab-login').classList.toggle('act',tab==='login');
  $('tab-reg').classList.toggle('act',tab==='reg');
  $('lbtn-txt').textContent=tab==='login'?'[ ВОЙТИ ]':'[ ЗАРЕГИСТРИРОВАТЬСЯ ]';
  $('lhint').textContent=tab==='login'?'Нет аккаунта? Перейди на РЕГИСТРАЦИЯ':'Есть аккаунт? Перейди на ВХОД';
  setLerr('');
}

// Enter
$('l-pass').onkeydown=e=>{if(e.key==='Enter')doAuth()};
$('r-pass').onkeydown=e=>{if(e.key==='Enter')doAuth()};
$('r-email').onkeydown=e=>{if(e.key==='Enter')$('r-pass').focus()};
$('r-name').onkeydown=e=>{if(e.key==='Enter')$('r-email').focus()};
$('l-email').onkeydown=e=>{if(e.key==='Enter')$('l-pass').focus()};
$('lbtn').onclick=doAuth;

function doAuth(){setLerr('');if(curTab==='login')doLogin();else doRegister()}

function doLogin(){
  const email=$('l-email').value.trim();
  const pass=$('l-pass').value;
  if(!email){setLerr('⚠ Введите e-mail');return}
  if(!pass){setLerr('⚠ Введите пароль');return}
  setBtnLoad(true);
  auth.signInWithEmailAndPassword(email,pass)
    .then(cred=>db.ref('uids/'+cred.user.uid).once('value').then(s=>{
      const nick=s.val();
      if(!nick)throw new Error('Профиль не найден');
      enterApp(cred.user.uid,nick,cred.user.email);
    }))
    .catch(e=>{
      setBtnLoad(false);
      const m={'auth/user-not-found':'⚠ Пользователь не найден','auth/wrong-password':'⚠ Неверный пароль','auth/invalid-email':'⚠ Неверный e-mail','auth/invalid-credential':'⚠ Неверный e-mail или пароль','auth/too-many-requests':'⚠ Слишком много попыток'};
      setLerr(m[e.code]||'⚠ '+e.message);
    });
}

function doRegister(){
  const nick=$('r-name').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const email=$('r-email').value.trim();
  const pass=$('r-pass').value;
  if(nick.length<2){setLerr('⚠ Ник: минимум 2 символа');return}
  if(!email){setLerr('⚠ Введите e-mail');return}
  if(pass.length<6){setLerr('⚠ Пароль: минимум 6 символов');return}
  setBtnLoad(true);

  // Шаг 1: создаём Auth-аккаунт (не требует прав БД)
  auth.createUserWithEmailAndPassword(email, pass)
    .then(cred => {
      const uid = cred.user.uid;
      // Шаг 2: теперь пользователь залогинен → проверяем уникальность ника
      return db.ref('users/'+nick).once('value').then(snap => {
        if(snap.exists()){
          // Ник занят — удаляем только что созданный Auth-аккаунт и сообщаем
          return cred.user.delete().then(()=>{
            setBtnLoad(false);
            setLerr('⚠ Ник @'+nick+' уже занят — выберите другой');
          });
        }
        // Шаг 3: записываем профиль в БД (пользователь уже auth != null)
        const upd={};
        upd['users/'+nick]={nick,uid,email,created:Date.now()};
        upd['uids/'+uid]=nick;
        return db.ref().update(upd).then(()=>enterApp(uid,nick,email));
      });
    })
    .catch(e=>{
      setBtnLoad(false);
      const m={
        'auth/email-already-in-use':'⚠ Этот e-mail уже используется',
        'auth/invalid-email':'⚠ Неверный e-mail',
        'auth/weak-password':'⚠ Пароль слишком простой',
        'auth/network-request-failed':'⚠ Нет соединения с сетью',
      };
      setLerr(m[e.code]||'⚠ '+e.message);
    });
}

function enterApp(uid,nick,email){
  ME_UID=uid;ME_NICK=nick;
  setBtnLoad(false);setLerr('');
  $('pav').textContent=ini(nick);
  $('pname').textContent='@'+nick.toUpperCase();
  $('p-nick').textContent='@'+nick;
  $('p-email').textContent=email||'';
  contacts=[];msgCache={};listeners={};unread={};
  loadContacts();
  goTo('chats');
  $('bnav').style.display='block';
  toast('✓ @'+nick.toUpperCase(),2000);
}

function loadContacts(){
  db.ref('contacts/'+ME_UID).on('child_added',snap=>{
    const p=snap.val();if(!p||contacts.includes(p))return;
    contacts.push(p);
    if(!msgCache[chid(ME_NICK,p)])msgCache[chid(ME_NICK,p)]=[];
    listenMsgs(p);
    renderList();
  });
}

function renderList(){
  const list=$('chat-list'),empty=$('empty-state');
  list.innerHTML='';
  if(!contacts.length){empty.classList.remove('hidden');return}
  empty.classList.add('hidden');
  contacts.forEach(peer=>{
    const ch=chid(ME_NICK,peer),msgs=msgCache[ch]||[],last=msgs[msgs.length-1];
    const row=document.createElement('div');row.className='chatrow';
    row.innerHTML=`<div class="av">${ini(peer)}</div><div class="cinfo"><div class="cname">@${esc(peer)}</div><div class="cprev" id="prev_${peer}">${last?esc(last.text).slice(0,40):'— нет сообщений —'}</div></div>${unread[peer]?`<div class="badge">${unread[peer]}</div>`:''}`;
    row.onclick=()=>openChat(peer);
    list.appendChild(row);
  });
}

function listenMsgs(peer){
  const ch=chid(ME_NICK,peer);
  if(listeners[ch])return;
  if(!msgCache[ch])msgCache[ch]=[];
  listeners[ch]=true;
  db.ref('chats/'+ch+'/msgs').orderByChild('ts').on('child_added',snap=>{
    const d=snap.val();if(!d)return;
    const id=snap.key;
    if(msgCache[ch].some(m=>m.id===id))return;
    const msg={id,from:d.from,text:d.text,ts:d.ts};
    msgCache[ch].push(msg);msgCache[ch].sort((a,b)=>a.ts-b.ts);
    const prev=$('prev_'+peer);if(prev)prev.textContent=d.text.slice(0,40);
    if(CUR_PEER===peer)appendMsg(msg);
    else if(d.from!==ME_NICK){unread[peer]=(unread[peer]||0)+1;renderList()}
  });
}

function openChat(peer){
  CUR_PEER=peer;CUR_CH=chid(ME_NICK,peer);unread[peer]=0;
  $('chat-av').textContent=ini(peer);
  $('chat-pname').textContent='@'+peer;
  const ml=$('msglist');ml.innerHTML='';
  (msgCache[CUR_CH]||[]).forEach(m=>appendMsg(m,false));
  ml.scrollTop=ml.scrollHeight;
  goTo('chat');
  setTimeout(()=>$('msginput').focus(),400);
}

function appendMsg(msg,scroll=true){
  const isMe=msg.from===ME_NICK;
  const g=document.createElement('div');g.className='mg '+(isMe?'me':'them');
  g.innerHTML=`<div class="bub">${esc(msg.text)}</div><div class="mmeta">${fmt(msg.ts)}</div>`;
  $('msglist').appendChild(g);
  if(scroll)$('msglist').scrollTop=$('msglist').scrollHeight;
}

$('sendbtn').onclick=sendMsg;
$('msginput').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}};
function sendMsg(){
  const text=$('msginput').value.trim();if(!text||!CUR_PEER)return;
  $('msginput').value='';$('msginput').focus();
  db.ref('chats/'+CUR_CH+'/msgs').push({from:ME_NICK,text,ts:Date.now()})
    .catch(e=>toast('⚠ Ошибка: '+e.message));
}

$('backbtn').onclick=()=>{CUR_PEER='';CUR_CH='';renderList();goTo('chats')};

$('fab').onclick=openModal;
$('modal-cancel').onclick=closeModal;
$('modal').onclick=e=>{if(e.target===$('modal'))closeModal()};
$('peer-inp').onkeydown=e=>{if(e.key==='Enter')searchUser()};
$('modal-ok').onclick=searchUser;

function openModal(){$('peer-inp').value='';setMS('','');$('modal').classList.add('open');setTimeout(()=>$('peer-inp').focus(),340)}
function closeModal(){$('modal').classList.remove('open')}
function setMS(m,c){const e=$('mstatus');e.textContent=m;e.className=c}

function searchUser(){
  const raw=$('peer-inp').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  if(!raw){toast('⚠ Введите ник');return}
  if(raw===ME_NICK){toast('⚠ Это ваш ник');return}
  if(contacts.includes(raw)){closeModal();openChat(raw);return}
  setMS('⏳ Поиск…','searching');$('modal-ok').disabled=true;
  db.ref('users/'+raw).once('value').then(snap=>{
    $('modal-ok').disabled=false;
    if(snap.exists()){
      const peerData=snap.val();
      setMS('✓ @'+raw+' найден!','ok');
      setTimeout(()=>{addContact(raw,peerData.uid);closeModal()},700);
    }else{setMS('✕ @'+raw+' не зарегистрирован','err')}
  }).catch(e=>{$('modal-ok').disabled=false;setMS('✕ Ошибка: '+e.message,'err')});
}

function addContact(peerNick,peerUid){
  const upd={};
  upd['contacts/'+ME_UID+'/'+peerNick]=peerNick;
  if(peerUid)upd['contacts/'+peerUid+'/'+ME_NICK]=ME_NICK;
  db.ref().update(upd);
  if(!contacts.includes(peerNick)){
    contacts.push(peerNick);
    msgCache[chid(ME_NICK,peerNick)]=[];
    listenMsgs(peerNick);
    renderList();
  }
  openChat(peerNick);
  toast('+ @'+peerNick+' добавлен');
}

$('cpybtn').onclick=()=>{if(navigator.clipboard)navigator.clipboard.writeText('@'+ME_NICK).then(()=>toast('✓ СКОПИРОВАНО'));else toast('@'+ME_NICK)};
$('logoutbtn').onclick=()=>{
  if(!confirm('Выйти из @'+ME_NICK+'?'))return;
  Object.keys(listeners).forEach(ch=>db.ref('chats/'+ch+'/msgs').off());
  if(ME_UID)db.ref('contacts/'+ME_UID).off();
  auth.signOut().then(()=>{
    ME_UID='';ME_NICK='';CUR_PEER='';CUR_CH='';
    contacts=[];msgCache={};listeners={};unread={};
    $('bnav').style.display='none';
    $('l-email').value='';$('l-pass').value='';
    setLerr('');setBtnLoad(false);switchTab('login');goTo('login');
  });
};

db.ref('.info/connected').on('value',snap=>setConn(snap.val()?'on':'off'));

auth.onAuthStateChanged(user=>{
  if(user&&!ME_UID){
    setConn('wait');
    db.ref('uids/'+user.uid).once('value').then(snap=>{
      const nick=snap.val();
      if(nick)enterApp(user.uid,nick,user.email);
      else{auth.signOut();setConn('off')}
    }).catch(()=>setConn('off'));
  }else if(!user&&curScr!=='login'){
    setConn('off');
  }
});
</script>
</body>
</html>
